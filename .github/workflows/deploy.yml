name: Deploy

on:
  workflow_dispatch:
    inputs:
      aws_access_key_id:
        description: "AWS Access Key ID"
        required: true
        type: string
      aws_secret_access_key:
        description: "AWS Secret Access Key"
        required: true
        type: string
      domain_url:
        description: "Domain URL for frontend (NEXT_PUBLIC_API_URL)"
        required: true
        type: string

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_PREFIX: products-manager-prod

jobs:
  deploy:
    name: Build and Push Images
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ inputs.aws_access_key_id }}
          aws-secret-access-key: ${{ inputs.aws_secret_access_key }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_PREFIX }}-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_PREFIX }}-backend:latest \
            ./backend
          docker push $ECR_REGISTRY/${{ env.ECR_PREFIX }}-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_PREFIX }}-backend:latest

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ inputs.domain_url }} \
            -t $ECR_REGISTRY/${{ env.ECR_PREFIX }}-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_PREFIX }}-frontend:latest \
            ./frontend
          docker push $ECR_REGISTRY/${{ env.ECR_PREFIX }}-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_PREFIX }}-frontend:latest

      - name: Build and push mongodb image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_PREFIX }}-mongodb:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_PREFIX }}-mongodb:latest \
            ./mongodb
          docker push $ECR_REGISTRY/${{ env.ECR_PREFIX }}-mongodb:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_PREFIX }}-mongodb:latest
