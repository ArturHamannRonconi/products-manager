name: Update Secrets

on:
  workflow_dispatch:
    inputs:
      parameter_name:
        description: "SSM Parameter to update"
        required: true
        type: choice
        options:
          - MONGODB_URI
          - JWT_SELLER_SECRET
          - JWT_CUSTOMER_SECRET
          - AWS_REGION
          - S3_BUCKET_NAME
          - FRONTEND_URL
          - NODE_ENV
      parameter_value:
        description: "New value for the parameter"
        required: true
        type: string
      aws_access_key_id:
        description: "AWS Access Key ID"
        required: true
        type: string
      aws_secret_access_key:
        description: "AWS Secret Access Key"
        required: true
        type: string
      restart_backend:
        description: "Restart backend service after update?"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  SSM_PREFIX: /products-manager/prod

jobs:
  update:
    name: Update SSM Parameter
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ inputs.aws_access_key_id }}
          aws-secret-access-key: ${{ inputs.aws_secret_access_key }}

      - name: Update SSM Parameter
        run: |
          aws ssm put-parameter \
            --name "${{ env.SSM_PREFIX }}/${{ inputs.parameter_name }}" \
            --value "${{ inputs.parameter_value }}" \
            --type SecureString \
            --overwrite
          echo "Updated ${{ env.SSM_PREFIX }}/${{ inputs.parameter_name }}"

      - name: Restart backend service
        if: inputs.restart_backend
        run: |
          aws ecs update-service \
            --cluster products-manager-prod-cluster \
            --service products-manager-prod-backend \
            --force-new-deployment
          echo "Backend service restart triggered"
